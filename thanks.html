<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バースナビ｜お申し込みありがとうございます</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1a4f8b">

<!-- ▲ Google広告 コンバージョンタグ -->

<style>
:root{
  --navy:#1a4f8b;--navy-d:#143b66;--cyan:#1bc4de;--cyan-d:#00a7c4;
  --ink:#0e1b2a;--gray:#5b6b7b;--bg:#f0f4f8;--line:#dbe3ec;
  --accent:#ff7a2c;--good:#0f8a4d;--white:#fff;--radius:14px;--shadow:0 10px 30px rgba(20,59,102,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;color:var(--ink);background:#eaf2fb;line-height:1.8;-webkit-font-smoothing:antialiased;letter-spacing:.02em;min-height:100vh;display:flex;flex-direction:column}
img{max-width:100%;display:block}
a{color:inherit}

/* header */
.gh{background:rgba(255,255,255,.95);border-bottom:1px solid var(--line)}
.gh .inner{max-width:1080px;margin:0 auto;padding:12px 24px;display:flex;align-items:center}
.logo-img{height:36px;width:auto;display:block}

/* thanks */
.thanks{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 20px}
.thanks-card{max-width:620px;width:100%;background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:44px 40px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:#eafaf3;color:var(--good);font-weight:900;font-size:14px;padding:8px 20px;border-radius:999px;margin-bottom:22px}
.badge .ck{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--good);color:#fff;font-size:13px}
.thanks h1{font-size:28px;font-weight:900;color:var(--navy);line-height:1.5;margin-bottom:18px}
.thanks h1 .hl{color:var(--accent)}
.thanks .body{font-size:16px;color:var(--ink);font-weight:600;margin-bottom:8px}
.thanks .note{font-size:13.5px;color:var(--gray);margin-top:14px}
.divider{height:1px;background:var(--line);margin:30px 0}
.cta-lead{font-size:14px;color:var(--gray);font-weight:700}
.cta-title{font-size:22px;font-weight:900;color:var(--navy);margin:4px 0 4px}
.cta-title .hl{color:var(--accent)}
.cta-sub{font-size:14px;color:var(--gray);margin-bottom:22px}
.timerex-iframe{width:100%;min-height:660px;border:1px solid var(--line);border-radius:12px;background:#fff}
.timerex-fallback{font-size:13px;color:var(--gray);margin-top:12px}
.timerex-fallback a{color:var(--cyan-d);font-weight:800;text-decoration:underline}
.home-link{display:inline-block;margin-top:26px;color:var(--navy);font-weight:800;font-size:14px;text-decoration:underline}
@media(max-width:600px){.thanks-card{padding:30px 20px}.thanks h1{font-size:22px}.timerex-iframe{min-height:720px}}

/* footer */
footer{background:var(--navy-d);color:#aebfd2;padding:26px 0;font-size:13px;text-align:center}
footer .logo{color:#fff;font-weight:900;font-size:18px;letter-spacing:.04em}
</style>
</head>
<body>

<!-- Header -->
<header class="gh">
  <div class="inner">
    <a href="index.html"><img src="assets/images/logo.svg" alt="バースナビ｜株式会社リズムチェンジ" class="logo-img"></a>
  </div>
</header>

<!-- Thanks -->
<main class="thanks">
  <div class="thanks-card">
    <span class="badge"><span class="ck">✓</span>送信が完了しました</span>
    <h1>お申し込み<br><span class="hl">ありがとうございます</span></h1>
    <p class="body">担当者より、2営業日以内にご連絡いたします。</p>
    <p class="note">※ ご記入いただいた連絡先に、担当者よりご案内のご連絡を差し上げます。<br>迷惑メール設定をされている場合は、受信設定のご確認をお願いいたします。</p>

    <div class="divider"></div>

    <p class="cta-lead">お急ぎの方・詳しく知りたい方はこちら</p>
    <p class="cta-title"><span class="hl">30分</span>で個別ご説明</p>
    <p class="cta-sub">ご都合のよい日時をお選びください</p>

    <!-- Begin TimeRex Widget -->
    <div id="timerex_calendar" data-url="https://timerex.net/s/shun_nakatani_a017_19f1/8a04e774"></div>
    <script id="timerex_embed" src="https://asset.timerex.net/js/embed.js"></script>
    <script type="text/javascript">
      TimerexCalendar();
    </script>
    <!-- End TimeRex Widget -->

    <a href="index.html" class="home-link">トップページへ戻る</a>
  </div>
</main>

<!-- Footer -->
<footer>
  <div class="logo">バースナビ</div>
</footer>

</body>
</html>
